<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Subhash Vision Scanner Final</title>
    <script async src="https://docs.opencv.org/4.7.0/opencv.js" onload="onOpenCvReady();"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; overflow: hidden; }
        .main-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #startBtn { width: 90%; height: 70%; background: #28a745; color: white; font-size: 3rem; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; display: none; }
        #status { position: fixed; bottom: 0; width: 100%; padding: 20px; background: #222; color: #ffc107; font-size: 1.5rem; z-index: 10; }
        video { width: 100%; height: 100%; object-fit: cover; display: none; }
    </style>
</head>
<body>

    <div id="status">सिस्टम लोड हो रहा है...</div>

    <div class="main-screen" id="ui">
        <h1 id="title">सुभाष स्कैनर</h1>
        <button id="startBtn" onclick="initScanner()">यहाँ टच करें <br> शुरू करें</button>
    </div>

    <video id="video" playsinline></video>

<script>
    let video = document.getElementById('video');
    let statusMsg = document.getElementById('status');
    let isCapturing = false;
    let lastGuidance = "";

    // आवाज़ वाला फंक्शन
    function speak(text) {
        if (lastGuidance === text) return; // बार-बार एक ही बात न बोले
        lastGuidance = text;
        window.speechSynthesis.cancel();
        let msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'hi-IN';
        window.speechSynthesis.speak(msg);
    }

    // बीप साउंड
    function beep(freq = 440, dur = 100) {
        let ctx = new (window.AudioContext || window.webkitAudioContext)();
        let osc = ctx.createOscillator();
        let gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.start();
        setTimeout(() => osc.stop(), dur);
    }

    // सिस्टम लोड होने पर
    function onOpenCvReady() {
        document.getElementById('status').innerText = "तैयार है";
        document.getElementById('startBtn').style.display = "block";
        speak("सिस्टम तैयार है। सुभाष जी, स्क्रीन के बीच में बड़ा हरा बटन दबाएं।");
    }

    // कैमरा शुरू करना
    async function initScanner() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: 1280, height: 720 } 
            });
            video.srcObject = stream;
            video.play();
            
            document.getElementById('ui').style.display = 'none';
            video.style.display = 'block';
            statusMsg.innerText = "कागज की तलाश जारी...";
            speak("कैमरा चालू हो गया है। अब कागज को धीरे-धीरे कैमरे के सामने लाएं।");
            
            // स्कैनिंग लूप शुरू
            setInterval(analyzeFrame, 600);
        } catch (err) {
            if (err.name === "NotAllowedError") {
                speak("कैमरा परमिशन नहीं मिली। कृपया ब्राउज़र सेटिंग्स में कैमरा चालू करें।");
                alert("Settings > Site Settings > Camera में जाकर इसे Allow करें।");
            } else {
                speak("कैमरा शुरू करने में कोई और दिक्कत है।");
                console.error(err);
            }
        }
    }

    function analyzeFrame() {
        if (isCapturing || !cv.imread) return;

        try {
            let canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            let ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);

            let src = cv.imread(canvas);
            let gray = new cv.Mat();
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
            cv.Canny(gray, gray, 50, 150);

            let contours = new cv.MatVector();
            let hierarchy = new cv.Mat();
            cv.findContours(gray, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

            let maxArea = 0;
            let bestContour = null;
            for (let i = 0; i < contours.size(); ++i) {
                let area = cv.contourArea(contours.get(i));
                if (area > maxArea) {
                    maxArea = area;
                    bestContour = contours.get(i);
                }
            }

            if (bestContour && maxArea > 35000) {
                let rect = cv.boundingRect(bestContour);
                let centerX = rect.x + (rect.width / 2);
                let imgW = video.videoWidth;

                // मार्गदर्शन
                if (maxArea < (imgW * video.videoHeight * 0.2)) {
                    speak("कैमरा थोड़ा और पास लाएं");
                } else if (centerX < (imgW * 0.3)) {
                    speak("कैमरा बाएं घुमाएं");
                } else if (centerX > (imgW * 0.7)) {
                    speak("कैमरा दाएं घुमाएं");
                } else {
                    beep(600, 200);
                    speak("बिल्कुल सही, स्थिर रखें");
                    isCapturing = true;
                    setTimeout(savePDF, 2500);
                }
            }

            src.delete(); gray.delete(); contours.delete(); hierarchy.delete();
        } catch (e) { }
    }

    function savePDF() {
        beep(800, 500);
        const { jsPDF } = window.jspdf;
        let canvas = document.createElement('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        let pdf = new jsPDF();
        pdf.addImage(canvas.toDataURL('image/jpeg'), 'JPEG', 0, 0, 210, 297);
        pdf.save("Subhash_Scan.pdf");
        
        speak("फोटो ले ली गई है। पी डी एफ फाइल सेव हो गई है। अगला पेज स्कैन करने के लिए तैयार रहें।");
        setTimeout(() => { isCapturing = false; lastGuidance = ""; }, 5000);
    }
</script>
</body>
</html>
