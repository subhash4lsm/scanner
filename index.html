<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Subhash Pro Smart Scanner</title>
    <script async src="https://docs.opencv.org/4.7.0/opencv.js" type="text/javascript" onload="onOpenCvReady();"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --accent: #28a745; --danger: #dc3545; }
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: #000; color: #fff; margin: 0; overflow: hidden; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #video-wrap { position: relative; width: 100%; height: 70vh; background: #222; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #canvasOutput { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .controls { padding: 15px; display: flex; justify-content: space-around; background: #111; border-top: 2px solid #333; }
        button { padding: 12px 25px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-scan { background: var(--accent); color: white; }
        .btn-save { background: #007bff; color: white; }
        .btn-flash { background: #ffc107; color: black; }
        #status { padding: 10px; font-size: 14px; background: #222; color: #ffc107; }
    </style>
</head>
<body>

    <div id="overlay">
        <h2>Subhash Smart Scanner</h2>
        <p id="load-msg">सिस्टम लोड हो रहा है...</p>
        <button id="startBtn" class="btn-scan" style="display:none;" onclick="startSystem()">स्कैनर शुरू करें</button>
    </div>

    <div id="status">सिस्टम तैयार हो रहा है...</div>

    <div id="video-wrap">
        <video id="video" playsinline></video>
        <canvas id="canvasOutput"></canvas>
    </div>

    <div class="controls">
        <button class="btn-flash" onclick="toggleFlash()">🔦 फ्लैश</button>
        <button class="btn-save" onclick="finalizePDF()">💾 PDF सेव करें</button>
    </div>

    <script>
        let video = document.getElementById('video');
        let canvas = document.getElementById('canvasOutput');
        let status = document.getElementById('status');
        let isCvLoaded = false;
        let isScanning = false;
        let scannedImages = [];

        function onOpenCvReady() {
            isCvLoaded = true;
            document.getElementById('load-msg').innerText = "सिस्टम तैयार है!";
            document.getElementById('startBtn').style.display = "block";
            status.innerText = "कृपया 'स्कैनर शुरू करें' दबाएं";
        }

        async function startSystem() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    document.getElementById('overlay').style.display = 'none';
                    status.innerText = "कागज को कैमरे के सामने लाएं...";
                    startDetection();
                };
            } catch (err) {
                alert("कैमरा एक्सेस नहीं मिला: " + err.message);
            }
        }

        function startDetection() {
            let cap = new cv.VideoCapture(video);
            let frame = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
            let gray = new cv.Mat();
            const FPS = 30;

            function processVideo() {
                try {
                    if (!video.srcObject) return;
                    cap.read(frame);
                    cv.cvtColor(frame, gray, cv.COLOR_RGBA2GRAY);
                    cv.GaussianBlur(gray, gray, new cv.Size(5, 5), 0);
                    cv.Canny(gray, gray, 75, 200);

                    let contours = new cv.MatVector();
                    let hierarchy = new cv.Mat();
                    cv.findContours(gray, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                    let found = false;
                    for (let i = 0; i < contours.size(); ++i) {
                        let cnt = contours.get(i);
                        let area = cv.contourArea(cnt);
                        if (area > 10000) { // अगर बड़ा कागज़ मिला
                            status.innerText = "कागज मिल गया! स्थिर रखें...";
                            status.style.color = "#28a745";
                            found = true;
                            // यहाँ आप ऑटो-कैप्चर लॉजिक भी जोड़ सकते हैं
                        }
                    }

                    if(!found) {
                        status.innerText = "कागज की तलाश जारी...";
                        status.style.color = "#ffc107";
                    }

                    contours.delete(); hierarchy.delete();
                    setTimeout(processVideo, 1000 / FPS);
                } catch (err) {
                    console.error(err);
                    setTimeout(processVideo, 1000 / FPS);
                }
            }
            processVideo();
        }

        async function toggleFlash() {
            const track = video.srcObject.getVideoTracks()[0];
            const caps = track.getCapabilities();
            if (caps.torch) {
                const s = track.getSettings();
                await track.applyConstraints({ advanced: [{ torch: !s.torch }] });
            } else {
                alert("इस डिवाइस में टॉर्च कंट्रोल उपलब्ध नहीं है।");
            }
        }

        function finalizePDF() {
            status.innerText = "PDF सेव की जा रही है...";
            // PDF सेव करने का लॉजिक यहाँ रहेगा
            alert("सुभाष जी, PDF फीचर एक्टिवेट हो रहा है।");
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'hi-IN';
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
